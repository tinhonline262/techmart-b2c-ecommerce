# Server Configuration
server:
  port: 8088

spring:
  application:
    name: payment-service
  web:
    resources:
      add-mappings: false

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3311/payment_service_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: payment_user
    password: payment_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Initialize schema
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
  flyway:
    enabled: true
    locations: classpath:db/migration

# Actuator Configuration (for Prometheus)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 10ms,50ms,100ms,200ms,500ms,1s
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# Logging
logging:
  level:
    org:
      springframework:
        web: INFO
        cache: TRACE
      hibernate:
        SQL: INFO
      flywaydb: DEBUG
    com:
      shopping:
        microservices: DEBUG
      github:
        benmanes:
          caffeine: TRACE

identity:
  jwt:
    secret-key: ${JWT_SECRET_KEY:cb3f30b0ec715f1bcbead50dc9d77786c038b569f2f6adb9a9e724e07ffd6c17}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

# Payment Gateway Configuration
payment:
  # Payment expiry timeout in minutes
  expiry:
    minutes: 30

  # VNPay Configuration
  vnpay:
    tmn-code: ${VNPAY_TMN_CODE:SDOSKJ4E}
    hash-secret: ${VNPAY_HASH_SECRET:7U9C2KGVUC5WHPND14QOPNBBKCIKSLGL}
    api-url: ${VNPAY_API_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
    return-url: ${VNPAY_RETURN_URL:http://localhost:8088/api/v1/payments/callback/vnpay}

  # COD Configuration
  cod:
    enabled: true
    max-amount: 50000000
    min-amount: 1000000
    service-fee: 0
