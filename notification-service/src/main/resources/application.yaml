server:
  port: 8083
spring:
  application:
    name: notification-service

  # Email Configuration
  mail:
    host: send.smtp.dev
    port: 587
    username: shawnee@techmart.com
    password: Tinhhuynh262@
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: true
# Actuator Configuration (for Prometheus)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,caches
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      sla:
        http.server.requests: 10ms,50ms,100ms,200ms,500ms,1s
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
mail:
  sender:
    from: shawnee@techmart.com
